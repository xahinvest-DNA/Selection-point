name: Finalize SP-S1-P10

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  finalize:
    if: startsWith(github.event.pull_request.head.ref, 'sp-s1-p10-finalize')
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply approved SP-S1-P10 update
        shell: bash
        run: |
          if [ -f docs/FOUNDATION/FIVE_STAGES_THEORY/10_STAGE_1_LIFE_MANIFESTATIONS.md ]; then
            echo "SP-S1-P10 is already finalized."
            exit 0
          fi

          python scripts/finalize_sp_s1_p10.py

          rm -f scripts/finalize_sp_s1_p10.py docs/.sp-s1-p10-open-pr
          rmdir scripts 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs
          git add -u scripts 2>/dev/null || true
          git commit -m "docs: approve SP-S1-P10 and pause before SP-S1-P11"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
