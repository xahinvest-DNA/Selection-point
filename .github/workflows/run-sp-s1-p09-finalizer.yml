name: Run SP-S1-P09 finalizer

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  finalize:
    if: startsWith(github.event.pull_request.head.ref, 'sp-s1-p09-finalize')
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Extract and run approved update
        shell: bash
        run: |
          if [ -f docs/FOUNDATION/FIVE_STAGES_THEORY/09_STAGE_1_BODY_MANIFESTATIONS.md ]; then
            echo "SP-S1-P09 documentation is already finalized."
            exit 0
          fi

          if [ -f docs/.sp-s1-p09-error.log ]; then
            echo "Diagnostic log already committed."
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/finalize-sp-s1-p09.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(source) if "python - <<'PY'" in line) + 1
          end = next(i for i in range(start, len(source)) if source[i].strip() == 'PY')
          lines = [line[10:] if line.startswith('          ') else line for line in source[start:end]]

          evidence_old = "| SP-VM-01 | граф траекторий выбора | утверждено как авторская визуальная модель | не является доказательством | проверить, не создаёт ли схема иллюзию равной доступности, полного контроля, обратимости и автоматического совпадения заявленной цели со значимым направлением; оценить понимание в пилоте |"
          evidence_new = "| SP-S1-P09 | тело внутри автоматического контура | утверждено в проекте | требует обзора, экспертной проверки и пилота | сопоставить с исследованиями интероцепции, аллостаза, стрессовой физиологии, влияния сна и истощения на решения, регуляции голода и насыщения, привычек и подкрепления без объявления тождества; проверить риск диагностических выводов, гиперконтроля тела и смешения ощущения с командой |\\n" + evidence_old
          replacement = "replace_once(evidence, " + repr(evidence_old) + ", " + repr(evidence_new) + ")"

          corrected = []
          for line in lines:
              if line.startswith("regex_once(evidence, r'^\\| SP-S1-P09 \\|.*$'"):
                  corrected.append(replacement)
              else:
                  corrected.append(line)

          code = '\n'.join(corrected) + '\n'
          Path('/tmp/finalize_sp_s1_p09.py').write_text(code, encoding='utf-8')
          PY

          set +e
          python /tmp/finalize_sp_s1_p09.py > /tmp/finalize_sp_s1_p09.log 2>&1
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            cp /tmp/finalize_sp_s1_p09.log docs/.sp-s1-p09-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/.sp-s1-p09-error.log
            git commit -m "chore: record SP-S1-P09 finalization error"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
            exit "$status"
          fi

          rm -f docs/.sp-s1-p09-open-pr
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs
          git commit -m "docs: approve SP-S1-P09 and pause before SP-S1-P10"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
