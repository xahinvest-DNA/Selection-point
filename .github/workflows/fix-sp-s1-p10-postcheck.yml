name: Fix SP-S1-P10 postcheck

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: startsWith(github.event.pull_request.head.ref, 'sp-s1-p10-finalize')
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply consistency corrections
        shell: bash
        run: |
          if [ ! -f docs/.sp-s1-p10-postcheck ]; then
            echo "No postcheck marker."
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              if old not in text:
                  raise RuntimeError(f'Anchor missing in {path}: {old}')
              target.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'docs/FOUNDATION/VISUAL_MODELS/01_CHOICE_TRAJECTORY_GRAPH.md',
              'материальные и relational следы предыдущих переходов',
              'материальные следы предыдущих переходов, включая состояние отношений'
          )
          replace_once(
              'docs/FOUNDATION/LIBRARIES/CROSS_REFERENCE_MAP.md',
              'материальные и relational следы переходов образуют текущую жизненную позицию и накопленную траекторию',
              'материальные следы переходов, включая состояние отношений, образуют текущую жизненную позицию и накопленную траекторию'
          )
          replace_once(
              'docs/FOUNDATION/LIBRARIES/CROSS_REFERENCE_MAP.md',
              '| SP-HCM-02 — состояние | SP-S1-P01, SP-S1-P02, SP-S1-P04, SP-S1-P05, SP-S1-P06, расхождение локального и широкого горизонта SP-S1-P07, реконструкция состояния SP-S1-P08 и непосредственная основа телесного слоя SP-S1-P09 |',
              '| SP-HCM-02 — состояние | SP-S1-P01, SP-S1-P02, SP-S1-P04, SP-S1-P05, SP-S1-P06, расхождение локального и широкого горизонта SP-S1-P07, реконструкция состояния SP-S1-P08, непосредственная основа телесного слоя SP-S1-P09 и ресурсное состояние жизненной позиции SP-S1-P10 |'
          )
          replace_once(
              'docs/FOUNDATION/LIBRARIES/CROSS_REFERENCE_MAP.md',
              '| SP-HCM-03 — автоматическая цепочка | SP-S1-P01, SP-S1-P05, SP-S1-P06, повторяемость траектории SP-S1-P07, структура реконструкции SP-S1-P08 и телесное разворачивание цепочки SP-S1-P09 |',
              '| SP-HCM-03 — автоматическая цепочка | SP-S1-P01, SP-S1-P05, SP-S1-P06, повторяемость траектории SP-S1-P07, структура реконструкции SP-S1-P08, телесное разворачивание цепочки SP-S1-P09 и накопление цепочек в жизненную траекторию SP-S1-P10 |'
          )
          replace_once(
              'docs/FOUNDATION/LIBRARIES/CROSS_REFERENCE_MAP.md',
              '| SP-HCM-04 — образ себя и сценарий | SP-S1-P03, SP-S1-P04, SP-S1-P05, SP-S1-P06, самообъяснение боли SP-S1-P07 и реконструкция активированной роли SP-S1-P08 |',
              '| SP-HCM-04 — образ себя и сценарий | SP-S1-P03, SP-S1-P04, SP-S1-P05, SP-S1-P06, самообъяснение боли SP-S1-P07, реконструкция активированной роли SP-S1-P08 и воспроизводство роли в жизненных сферах SP-S1-P10 |'
          )
          replace_once(
              'docs/FOUNDATION/LIBRARIES/CROSS_REFERENCE_MAP.md',
              '| SP-HCM-07 — множественные точки восстановления | непосредственное основание SP-S1-P05; граница иллюзии SP-S1-P06, неразличимость места изменения SP-S1-P07, поиск доступного участка SP-S1-P08 и возможность раннего телесного обнаружения SP-S1-P09 |',
              '| SP-HCM-07 — множественные точки восстановления | непосредственное основание SP-S1-P05; граница иллюзии SP-S1-P06, неразличимость места изменения SP-S1-P07, поиск доступного участка SP-S1-P08, возможность раннего телесного обнаружения SP-S1-P09 и дальнейшее участие из текущей жизненной позиции SP-S1-P10 |'
          )
          replace_once(
              'docs/FOUNDATION/PROJECT_OPERATING_PROTOCOL.md',
              '**Дата:** 5 июля 2026 года',
              '**Дата:** 6 июля 2026 года'
          )
          replace_once(
              'docs/FOUNDATION/PROJECT_OPERATING_PROTOCOL.md',
              '- без усиления боли или стыда ради мотивации.',
              '- без усиления боли или стыда ради мотивации;\n- без объявления жизненной трудности заслуженным результатом или предопределённым уроком.'
          )

          Path('docs/.sp-s1-p10-postcheck').unlink()

          assert 'relational' not in Path('docs/FOUNDATION/VISUAL_MODELS/01_CHOICE_TRAJECTORY_GRAPH.md').read_text(encoding='utf-8')
          assert 'relational' not in Path('docs/FOUNDATION/LIBRARIES/CROSS_REFERENCE_MAP.md').read_text(encoding='utf-8')
          assert '**Дата:** 6 июля 2026 года' in Path('docs/FOUNDATION/PROJECT_OPERATING_PROTOCOL.md').read_text(encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "docs: finalize SP-S1-P10 consistency"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
