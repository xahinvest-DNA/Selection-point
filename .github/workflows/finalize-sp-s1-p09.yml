## Центральный тезис

Телесные проявления первой ступени состоят не в обязательном наборе симптомов, а в том, что тело участвует во всём автоматическом контуре, оставаясь недостаточно различённым его слоем.

## Что добавляет параметр

SP-S1-P09 определяет структурную роль тела внутри первой ступени. Тело выступает исходным состоянием, носителем разворачивающейся реакции, объектом оперативной задачи, получателем немедленного результата, носителем отложенной цены и частью следующей позиции.

Параметр не утверждает диагноз, практику, рекомендации по образу жизни, критерий перехода или жизненные проявления SP-S1-P10.

## Механизм

```text
условия жизни
→ телесное состояние
→ изменение внимания и восприятия
→ срочная оперативная задача
→ привычный способ изменить состояние
→ немедленный телесный результат
→ отложенная телесная цена
→ следующее состояние
→ новый автоматический эпизод
```

## Основные формы

- состояние замечается преимущественно при высокой интенсивности;
- ощущение сливается с его значением;
- телесное состояние переживается как команда к определённому действию;
- реальная потребность сливается с привычным средством регулирования;
- немедленное облегчение заслоняет отложенную цену;
- телесные последствия предыдущего хода не связываются со следующей позицией;
- тело игнорируется, подавляется, чрезмерно контролируется или принимается за абсолютный источник истины.

## Главные различения и границы

- телесное ощущение не равно доказательству внешней ситуации;
- телесное состояние не равно приказу к определённому действию;
- реальная потребность не равна одному привычному средству;
- временное облегчение не равно решению всей задачи;
- телесный сигнал не является медицинским диагнозом;
- внимание к телу не равно подчинению телу;
- дисциплина не равна войне с телом;
- отложенное последствие не является случайным новым состоянием;
- противоположные внешние формы могут выражать одну структуру недостаточного различения.

Применимые границы: SP-RISK-002, SP-RISK-003, SP-RISK-007, SP-RISK-008, SP-RISK-012–SP-RISK-016, SP-RISK-020, SP-RISK-021.

## Связи

Опирается на Архитектурную декларацию, SP-HCM-02, SP-HCM-03, SP-HCM-05–SP-HCM-08 и SP-S1-P01–SP-S1-P08.

Связанные термины: SP-TERM-BODY-AUTOMATIC-CONTOUR, SP-TERM-STATE, SP-TERM-AUTOMATIC-CHAIN, SP-TERM-OPERATIONAL-TASK, SP-TERM-IMMEDIATE-RESULT, SP-TERM-DEFERRED-PRICE, SP-TERM-CURRENT-POSITION, SP-TERM-NEXT-POSITION.

Связанные примеры: SP-EX-BODY-CONTOUR-001, SP-EX-FOOD-001, SP-EX-ALCOHOL-001, SP-EX-TRADE-001, SP-EX-TRAJECTORY-001.

SP-S1-P10 не открывается автоматически и не выводится из телесных проявлений.

## Связь с SP-S1-P08

Реконструкция конкретного эпизода должна видеть тело как сквозной слой: исходное состояние, изменения во время реакции, ожидаемое изменение состояния, немедленный результат, отложенную цену и последующее состояние.

## Связь с SP-VM-01

Телесное состояние входит в узел текущей позиции, изменяется в ходе перехода и становится частью новой позиции. Граф не превращает телесные сигналы в доказательство доступности любого хода или в медицинское объяснение.

## Архитектурные следствия

- будущая практика должна различать тело до, во время и после привычного действия;
- она должна отделять ощущение, значение, потребность и привычный ответ;
- она не должна требовать постоянного сканирования или тотального контроля;
- медицинские и клинические вопросы остаются вне самостоятельной интерпретации метода;
- конкретные способы сна, питания, движения и восстановления утверждаются позднее;
- жизненные проявления SP-S1-P10 остаются отдельным вопросом.

