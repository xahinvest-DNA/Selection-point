name: Fix SP-S1-P08 cross-links

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'sp-s1-p08-finalize'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Synchronize approved links
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def patch(path, fn):
              p = Path(path)
              old = p.read_text(encoding='utf-8')
              new = fn(old)
              p.write_text(new, encoding='utf-8')

          patch('README.md', lambda s: re.sub(r'\n\s+7\. главная боль —', '\n  7. главная боль —', s, count=1))

          def patch_current(s):
              old = '- расхождение фактически формируемой траектории со значимым направлением SP-S1-P07.'
              new = old + '\n- реконструкцию конкретного эпизода как последовательности позиций и ходов SP-S1-P08.'
              if 'последовательности позиций и ходов SP-S1-P08' not in s:
                  if old not in s:
                      raise RuntimeError('Current state visual link anchor not found')
                  s = s.replace(old, new, 1)
              return s
          patch('docs/FOUNDATION/CURRENT_PROJECT_STATE.md', patch_current)

          def patch_claims(s):
              old = '| SP-VM-01 | Граф траекторий выбора | Узлы показывают текущие позиции, стрелки — ходы, замкнутые маршруты — автоматические контуры, новые ветви — изменение поля последующего выбора, а сравнение траектории со значимым направлением — архитектуру боли SP-S1-P07. | утверждено | `VISUAL_MODELS/01_CHOICE_TRAJECTORY_GRAPH.md` |'
              new = '| SP-VM-01 | Граф траекторий выбора | Узлы показывают текущие позиции, стрелки — ходы, замкнутые маршруты — автоматические контуры, новые ветви — изменение поля последующего выбора, сравнение траектории со значимым направлением — архитектуру боли SP-S1-P07, а последовательность позиций и ходов — опору реконструкции SP-S1-P08. | утверждено | `VISUAL_MODELS/01_CHOICE_TRAJECTORY_GRAPH.md` |'
              if 'опору реконструкции SP-S1-P08' not in s:
                  if old not in s:
                      raise RuntimeError('Claims visual model row not found')
                  s = s.replace(old, new, 1)
              return s
          patch('docs/FOUNDATION/LIBRARIES/CLAIMS_REGISTRY.md', patch_claims)

          def patch_cross(s):
              replacements = {
                  '| SP-HCM-01 — воспринятая модель | SP-S1-P02; участвует в SP-S1-P01, SP-S1-P04, SP-S1-P06 и смене оценки в SP-S1-P07 |': '| SP-HCM-01 — воспринятая модель | SP-S1-P02; участвует в SP-S1-P01, SP-S1-P04, SP-S1-P06, смене оценки в SP-S1-P07 и реконструкции воспринятой ситуации в SP-S1-P08 |',
                  '| SP-HCM-02 — состояние | SP-S1-P01, SP-S1-P02, SP-S1-P04, SP-S1-P05, SP-S1-P06 и расхождение локального и широкого горизонта SP-S1-P07 |': '| SP-HCM-02 — состояние | SP-S1-P01, SP-S1-P02, SP-S1-P04, SP-S1-P05, SP-S1-P06, расхождение локального и широкого горизонта SP-S1-P07 и реконструкция состояния SP-S1-P08 |',
                  '| SP-HCM-03 — автоматическая цепочка | SP-S1-P01, SP-S1-P05, SP-S1-P06 и повторяемость траектории SP-S1-P07 |': '| SP-HCM-03 — автоматическая цепочка | SP-S1-P01, SP-S1-P05, SP-S1-P06, повторяемость траектории SP-S1-P07 и непосредственная структура реконструкции SP-S1-P08 |',
                  '| SP-HCM-04 — образ себя и сценарий | SP-S1-P03, SP-S1-P04, SP-S1-P05, SP-S1-P06 и самообъяснение боли SP-S1-P07 |': '| SP-HCM-04 — образ себя и сценарий | SP-S1-P03, SP-S1-P04, SP-S1-P05, SP-S1-P06, самообъяснение боли SP-S1-P07 и реконструкция активированной роли SP-S1-P08 |',
                  '| SP-HCM-05 — действие меняет действующего | SP-S1-P05–SP-S1-P07 и SP-VM-01; будущие критерии перехода и ловушка ступени |': '| SP-HCM-05 — действие меняет действующего | SP-S1-P05–SP-S1-P08 и SP-VM-01; будущие критерии перехода и ловушка ступени |',
                  '| SP-HCM-06 — обратная связь | SP-S1-P05–SP-S1-P07, SP-VM-01; будущие практики и критерии перехода |': '| SP-HCM-06 — обратная связь | SP-S1-P05–SP-S1-P08, SP-VM-01; будущие практики и критерии перехода |',
                  '| SP-HCM-07 — множественные точки восстановления | непосредственное основание SP-S1-P05; граница иллюзии SP-S1-P06 и неразличимость места изменения SP-S1-P07 |': '| SP-HCM-07 — множественные точки восстановления | непосредственное основание SP-S1-P05; граница иллюзии SP-S1-P06, неразличимость места изменения SP-S1-P07 и поиск доступного участка SP-S1-P08 |',
                  '| SP-HCM-08 — повторяющиеся циклы | SP-S1-P06, SP-S1-P07, SP-VM-01; будущие практики, критерии перехода и следующая ступень |': '| SP-HCM-08 — повторяющиеся циклы | SP-S1-P06–SP-S1-P08, SP-VM-01; будущие практики, критерии перехода и следующая ступень |',
                  '- термины SP-TERM-CURRENT-POSITION, SP-TERM-FIELD-OF-MOVES, SP-TERM-AVAILABLE-MOVE, SP-TERM-TRAJECTORY-GRAPH, SP-TERM-AUTOMATIC-CONTOUR, SP-TERM-NEXT-POSITION, SP-TERM-INEVITABLE-CONTINUATION и SP-TERM-INTENTION-TRAJECTORY-DIVERGENCE;': '- термины SP-TERM-CURRENT-POSITION, SP-TERM-FIELD-OF-MOVES, SP-TERM-AVAILABLE-MOVE, SP-TERM-TRAJECTORY-GRAPH, SP-TERM-AUTOMATIC-CONTOUR, SP-TERM-NEXT-POSITION, SP-TERM-INEVITABLE-CONTINUATION, SP-TERM-INTENTION-TRAJECTORY-DIVERGENCE и SP-TERM-EPISODE-RECONSTRUCTION;',
                  '- примеры SP-EX-TRAJECTORY-001, SP-EX-INEVITABLE-001 и SP-EX-DIVERGENCE-001;': '- примеры SP-EX-TRAJECTORY-001, SP-EX-INEVITABLE-001, SP-EX-DIVERGENCE-001 и SP-EX-RECONSTRUCTION-001;'
              }
              for old, new in replacements.items():
                  if new in s:
                      continue
                  if old not in s:
                      raise RuntimeError(f'Cross-reference anchor not found: {old}')
                  s = s.replace(old, new, 1)
              return s
          patch('docs/FOUNDATION/LIBRARIES/CROSS_REFERENCE_MAP.md', patch_cross)

          marker = Path('docs/.sp-s1-p08-fix-links')
          if marker.exists():
              marker.unlink()

          checks = {
              'README.md': ['\n  7. главная боль', '\n  8. следующий навык'],
              'docs/FOUNDATION/CURRENT_PROJECT_STATE.md': ['последовательности позиций и ходов SP-S1-P08'],
              'docs/FOUNDATION/LIBRARIES/CLAIMS_REGISTRY.md': ['опору реконструкции SP-S1-P08'],
              'docs/FOUNDATION/LIBRARIES/CROSS_REFERENCE_MAP.md': ['непосредственная структура реконструкции SP-S1-P08', 'SP-EX-RECONSTRUCTION-001;']
          }
          for path, needles in checks.items():
              text = Path(path).read_text(encoding='utf-8')
              for needle in needles:
                  if needle not in text:
                      raise RuntimeError(f'Missing {needle!r} in {path}')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs
          if git diff --cached --quiet; then
            echo "Cross-links already synchronized."
            exit 0
          fi
          git commit -m "docs: synchronize SP-S1-P08 cross-links"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
