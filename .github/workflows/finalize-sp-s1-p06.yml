name: Finalize SP-S1-P06

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/finalize-sp-s1-p06.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.head_commit.message == 'chore: trigger SP-S1-P06 finalization'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply approved architecture update
        run: python3 scripts/finalize_sp_s1_p06.py

      - name: Commit synchronized project state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "docs: approve SP-S1-P06 and advance to SP-S1-P07 [skip ci]"
          git push
