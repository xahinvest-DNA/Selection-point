name: Finalize SP-S1-P06

on:
  issues:
    types:
      - opened

permissions:
  contents: write
  issues: write

jobs:
  finalize:
    if: github.event.issue.title == 'RUN SP-S1-P06 FINALIZER'
    runs-on: ubuntu-latest
    steps:
      - name: Check out finalization branch
        uses: actions/checkout@v4
        with:
          ref: sp-s1-p06-finalize
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply approved architecture update
        run: python3 scripts/finalize_sp_s1_p06.py

      - name: Remove one-time trigger markers
        run: rm -f docs/.sp-s1-p06-*

      - name: Commit synchronized project state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "docs: approve SP-S1-P06 and advance to SP-S1-P07 [skip ci]"
          git push origin HEAD:sp-s1-p06-finalize
