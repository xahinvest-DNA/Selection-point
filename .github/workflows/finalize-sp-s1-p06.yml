name: Finalize SP-S1-P06

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'sp-s1-p06-finalize'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply approved architecture update
        run: python3 scripts/finalize_sp_s1_p06.py

      - name: Commit synchronized project state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "docs: approve SP-S1-P06 and advance to SP-S1-P07 [skip ci]"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
